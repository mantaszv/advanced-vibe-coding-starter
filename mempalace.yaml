# MemPalace konfigūracija
# Dokumentacija: https://github.com/MemPalace/mempalace

palace_name: advanced-vibe-coding-starter

# Vector store backend
backend:
  type: chromadb
  path: .mempalace/chroma

# Auto-save hooks į Claude Code sesijas
auto_save:
  enabled: true
  on_compact: true        # Prieš context compression
  interval_minutes: 15    # Periodinis save

# Knowledge graph (SQLite)
knowledge_graph:
  enabled: true
  path: .mempalace/kg.db
  temporal_validity: true # Saugo "nuo kada / iki kada" info galioja

# Ingest settings Memoriki stiliui
ingest:
  source_dir: raw/
  wiki_dir: wiki/
  chunk_size: 800
  overlap: 100
  verbatim: true          # Nelaikome verbatim — MemPalace esmė

# Wings (projektai/žmonės) — Memoriki abstraction
wings:
  - name: project
    description: Šio projekto kontekstas, sprendimai, gotchas
  - name: sources
    description: Išoriniai šaltiniai (paper'iai, straipsniai, docs)
  - name: decisions
    description: ADR — architecture decision records

# Rooms (temos) — plaukioja per wings
rooms:
  auto_create: true       # MemPalace pats kuria rooms pagal turinį
